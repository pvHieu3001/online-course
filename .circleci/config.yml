version: 2.1

executors:
  course-node-executor:
    docker:
      - image: cimg/node:20.19.0
    working_directory: ~/project/online-course
  course-java-executor:
    docker:
      - image: cimg/openjdk:17.0
    working_directory: ~/project/online-course
  course-docker-executor:
    docker:
      - image: docker:24.0.2
    working_directory: ~/project/online-course

jobs:
  build-fe:
    executor: course-node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-fe-{{ checksum "fe/package.json" }}
            - v1-dependencies-fe-
      - run:
          name: Clean and install dependencies
          command: |
            cd fe
            rm -rf node_modules package-lock.json
            npm cache clean --force
            npm install --legacy-peer-deps
      - save_cache:
          paths:
            - fe/node_modules
          key: v1-dependencies-fe-{{ checksum "fe/package.json" }}
      - run:
          name: Verify Vite installation
          command: cd fe && npx vite --version
      - run:
          name: Build FE
          command: cd fe && npx vite build
      - persist_to_workspace:
          root: fe
          paths:
            - dist
  test-fe:
    executor: course-node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-fe-{{ checksum "fe/package.json" }}
            - v1-dependencies-fe-
      - run:
          name: Install dependencies (if cache miss)
          command: |
            cd fe
            if [ ! -d "node_modules" ]; then
              rm -rf node_modules package-lock.json
              npm cache clean --force
              npm install --legacy-peer-deps
            fi
      - run:
          name: Test FE
          command: cd fe && npm test || true
  build-be:
    executor: course-java-executor
    steps:
      - checkout
      - run:
          name: Grant execute permission for mvnw
          command: cd be && chmod +x mvnw
      - run:
          name: Build BE
          command: cd be && ./mvnw clean install -DskipTests
      - persist_to_workspace:
          root: be
          paths:
            - target
            - dockerfile
            - docker-compose.yml
            - pom.xml
            - src
  test-be:
    executor: course-java-executor
    steps:
      - checkout
      - run:
          name: Grant execute permission for mvnw
          command: cd be && chmod +x mvnw
      - run:
          name: Test BE
          command: cd be && ./mvnw test
  deploy-fe:
    executor: course-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: fe
      - add_ssh_keys:
          fingerprints:
            - "SHA256:WAbTxIkHjFjU4Qff1Kok3r8niH0cBjr0jGnulGsXTy8"
      - run:
          name: Deploy Frontend to Server
          command: |
            # Create deployment script
            cat > deploy-fe.sh \<< 'EOF'
            #!/bin/bash
            set -e
            set -x

            # Server configuration from environment variables
            SERVER_HOST="${SERVER_HOST:-your-server.com}"
            SERVER_USER="${SERVER_USER:-deploy}"
            FRONTEND_PATH="${FRONTEND_PATH:-/var/www/frontend}"
            UPLOAD_GIT_PATH="/var/www/html/online-course/uploads"
            COMMIT_MESSAGE="Deploy: Cập nhật ảnh ngày $(date +'%Y-%m-%d %H:%M:%S')"
            BRANCH_NAME="master"

            echo "🚀 Starting frontend deployment to ${SERVER_HOST}..."

            # Create frontend directory if it doesn't exist
            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${FRONTEND_PATH}"

            # Upload new frontend build
            echo "📤 Uploading new frontend build..."
            scp -o StrictHostKeyChecking=no -r fe/dist/* ${SERVER_USER}@${SERVER_HOST}:${FRONTEND_PATH}/

            # Set proper permissions
            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "chmod -R 755 ${FRONTEND_PATH}"

            # Restart nginx if it exists
            if ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "systemctl is-active --quiet nginx"; then
              echo "🔄 Restarting nginx..."
              ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "sudo systemctl reload nginx"
            fi

            echo "✅ Frontend deployment completed successfully!"
            EOF

            chmod +x deploy-fe.sh
            ./deploy-fe.sh
  deploy-be:
    executor: course-java-executor
    steps:
      - checkout
      - attach_workspace:
          at: be
      - add_ssh_keys:
          fingerprints:
            - "SHA256:WAbTxIkHjFjU4Qff1Kok3r8niH0cBjr0jGnulGsXTy8"
      - run:
          name: Verify workspace contents
          command: |
            echo "Current directory: $(pwd)"
            echo "Directory contents:"
            ls -la
            echo "Target directory contents:"
            ls -la target/ || echo "Target directory not found"
      - run:
          name: Deploy Backend to VPS
          command: |
            # Create deployment script
            cat > deploy-be.sh \<< 'EOF'
            #!/bin/bash
            set -e
            set -x

            # Server configuration from environment variables
            SERVER_HOST="${SERVER_HOST:-your-server.com}"
            SERVER_USER="${SERVER_USER:-deploy}"
            BACKEND_PATH="${BACKEND_PATH:-/home/deploy/online-course/be}"
            DATABASE_PATH="/var/www/html/online-course/database"
            DOCKER_IMAGE_NAME="${DOCKER_IMAGE_NAME:-online-course-backend}"
            DOCKER_IMAGE_TAG="${DOCKER_IMAGE_TAG:-v1.0.0}"
            DOCKER_CONTAINER_NAME="${DOCKER_CONTAINER_NAME:-online-course-backend}"
            DB_NAME="${DB_NAME:-online_course}"
            DB_USER="${DB_USER:-user}"
            DB_PASSWORD="${DB_PASSWORD:-password}"
            COMMIT_MESSAGE="Deploy: Backup db ngày $(date +'%Y-%m-%d %H:%M:%S')"
            BRANCH_NAME="master"

            echo "🚀 Starting backend deployment to ${SERVER_HOST}..."

            # Create database directory if it doesn't exist
            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${DATABASE_PATH}"


            # Find the JAR file (fix path)
            JAR_FILE=$(find be/target -name "*.jar" -not -name "*sources.jar" -not -name "*javadoc.jar" | head -1)

            if [ -z "$JAR_FILE" ]; then
              echo "❌ No JAR file found in be/target directory"
              echo "be/target directory contents:"
              ls -la be/target/ || echo "be/target directory not found"
              exit 1
            fi

            echo "📦 Found JAR file: $JAR_FILE"

            # Create backend directory if it doesn't exist
            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${BACKEND_PATH}"

            # Backup database
            # ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "
            #   git config --global --add safe.directory ${DATABASE_PATH} && cd ${DATABASE_PATH} && git pull "

            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "
              CONTAINER_ID=\$(docker ps -q -f 'label=com.docker.compose.service=db-mysql')
              if [ ! -z \"\$CONTAINER_ID\" ]; then
                echo '✅ Found MySQL container. Creating backup...'
                docker exec \$CONTAINER_ID mysqldump -u ${DB_USER} -p${DB_PASSWORD} ${DB_NAME} | gzip > ${DATABASE_PATH}/db_backup.sql.gz
              else
                echo '🤔 MySQL container not found.'
              fi
            "

            # Upload entire backend directory with existing Docker files
            echo "📤 Uploading backend files..."
            scp -o StrictHostKeyChecking=no -r be/target/online-course-0.0.1-SNAPSHOT.jar ${SERVER_USER}@${SERVER_HOST}:${BACKEND_PATH}/target/

            # Run new container with docker-compose
            echo "🚀 Rebuilding and starting services..."
            ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "
              cd ${BACKEND_PATH} && \
              docker compose -p online-course down --remove-orphans && \
              SPRING_PROFILES_ACTIVE=docker docker compose -p online-course up -d --build
            "

            echo "✅ Backend deployment completed successfully!"
            EOF

            chmod +x deploy-be.sh
            ./deploy-be.sh

workflows:
  version: 2
  build-and-test:
    jobs:
      - build-fe
      - test-fe:
          requires:
            - build-fe
      - build-be
      - test-be:
          requires:
            - build-be
      - deploy-fe:
          requires:
            - build-fe
          filters:
            branches:
              only: master
      - deploy-be:
          requires:
            - build-be
          filters:
            branches:
              only: master
