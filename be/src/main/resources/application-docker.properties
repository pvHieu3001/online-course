
#database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.database-platform = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database=mysql

spring.test.database.replace=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#security
application.security.jwt.secret-key=${APP_JWT_SECRET}
application.security.jwt.expiration=${APP_JWT_EXPIRATION}
application.security.jwt.refresh-token.expiration=604800000

groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

thread.account-1=${ACCOUNT_1}
thread.account-1-id=${ACCOUNT_1_ID}
thread.account-2=${ACCOUNT_2}
thread.account-2-id=${ACCOUNT_2_ID}
thread.account-3=${ACCOUNT_3}
thread.account-3-id=${ACCOUNT_3_ID}
thread.account-4=${ACCOUNT_4}
thread.account-4-id=${ACCOUNT_4_ID}
thread.account-5=${ACCOUNT_5}
thread.account-5-id=${ACCOUNT_5_ID}

application.upload.url=/app/uploads
application.env=staging

